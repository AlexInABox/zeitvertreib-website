name: Build and Deploy (Dev)

on:
  push:
    branches:
      - "dev"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # DETECT CHANGES - Determine what to build
  # ============================================
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      types: ${{ steps.filter.outputs.types }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      overwatch: ${{ steps.filter.outputs.overwatch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get last successful run commit
        id: last-success
        run: |
          # Get the SHA of the last successful workflow run
          LAST_SUCCESS_SHA=$(gh run list \
            --workflow="${{ github.workflow }}" \
            --branch="${{ github.ref_name }}" \
            --status=success \
            --limit=1 \
            --json headSha \
            --jq '.[0].headSha')

          # Fallback to github.event.before if no previous successful run
          BASE_SHA="${LAST_SUCCESS_SHA:-${{ github.event.before }}}"
          echo "base=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "Using base SHA: $BASE_SHA"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.last-success.outputs.base }}
          filters: |
            types:
              - 'types/**'
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            overwatch:
              - 'overwatch/**'

  # ============================================
  # BUILD JOBS - Run conditionally based on changes
  # ============================================

  build-types:
    name: 🔨 Build Types
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.types == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: types

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: types/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload types artifact
        uses: actions/upload-artifact@v6
        with:
          name: types-dist
          path: types/dist/

  build-frontend:
    name: 🔨 Build Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    # Build if types changed OR frontend changed
    if: |
      needs.detect-changes.outputs.types == 'true' ||
      needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build shared types
        working-directory: types
        run: npm install && npm run build

      - name: Install dependencies
        run: npm install

      - name: Build (dev)
        run: npm run build:dev

  build-backend:
    name: 🔨 Build Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    # Build if types changed OR backend changed
    if: |
      needs.detect-changes.outputs.types == 'true' ||
      needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 1a27efaacb5e2b77fcaec04e0f6b0a0b

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Build shared types
        working-directory: types
        run: npm install && npm run build

      - name: Install dependencies
        run: npm install

      - name: Prepare environment
        run: cp .env.example .env

      - name: Verify Wrangler types
        run: npx wrangler types -e dev

      - name: Test build with code schema
        run: npx tsc

      - name: Pull real database schema
        run: NODE_ENV=production npx drizzle-kit pull

      - name: Test build with real schema
        run: |
          mv src/db/schema.ts src/db/schema.ts.back
          cp drizzle/schema.ts src/db/schema.ts
          npx tsc
          mv src/db/schema.ts.back src/db/schema.ts

      - name: Final build
        run: npx tsc

  build-overwatch:
    name: 🔨 Build Overwatch
    runs-on: ubuntu-latest
    needs: detect-changes
    # Build if types changed OR overwatch changed
    if: |
      needs.detect-changes.outputs.types == 'true' ||
      needs.detect-changes.outputs.overwatch == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v2

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: overwatch/Dockerfile
          push: false
          tags: zeitvertreib-overwatch:test

  # ============================================
  # DEPLOY JOBS - Only run on dev branch
  # ============================================

  deploy-frontend:
    name: 🚀 Deploy Frontend (Dev)
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/dev' &&
      (needs.detect-changes.outputs.types == 'true' || needs.detect-changes.outputs.frontend == 'true') &&
      needs.build-frontend.result == 'success'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 1a27efaacb5e2b77fcaec04e0f6b0a0b

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build shared types
        working-directory: types
        run: npm install && npm run build

      - name: Install dependencies
        run: npm install

      - name: Build (dev)
        run: npm run build:dev

      - name: Deploy to Cloudflare (dev)
        run: npx wrangler deploy -e dev

  deploy-backend:
    name: 🚀 Deploy Backend (Dev)
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend]
    if: |
      always() &&
      github.ref == 'refs/heads/dev' &&
      (needs.detect-changes.outputs.types == 'true' || needs.detect-changes.outputs.backend == 'true') &&
      needs.build-backend.result == 'success'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 1a27efaacb5e2b77fcaec04e0f6b0a0b

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Build shared types
        working-directory: types
        run: npm install && npm run build

      - name: Install dependencies
        run: npm install

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build
        run: npx tsc

      - name: Deploy to Cloudflare (dev)
        run: npx wrangler deploy -e dev

  deploy-overwatch:
    name: 🚀 Deploy Overwatch (Dev)
    runs-on: ubuntu-latest
    needs: [detect-changes, build-overwatch]
    if: |
      always() &&
      github.ref == 'refs/heads/dev' &&
      (needs.detect-changes.outputs.types == 'true' || needs.detect-changes.outputs.overwatch == 'true') &&
      needs.build-overwatch.result == 'success'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v2
      - id: downcase
        name: downcase REPO_OWNER
        run: |
          OWNER=${GITHUB_REPOSITORY%%/*}
          echo "REPO_OWNER=${OWNER,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.downcase.outputs.REPO_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: overwatch/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.downcase.outputs.REPO_OWNER }}/zeitvertreib-overwatch:dev
