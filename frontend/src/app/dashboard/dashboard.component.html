<div class="dashboard-container">
  <div class="relative z-10">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state">
      <div class="text-center text-white">
        <div class="loading-spinner mx-auto mb-4"></div>
        <p class="text-xl font-medium">Lade Statistiken...</p>
      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="hasError && !isLoading" class="error-state">
      <div class="error-message max-w-md mx-auto">
        <h3 class="text-xl font-bold mb-2">Fehler beim Laden</h3>
        <p class="mb-4">{{ errorMessage }}</p>
        <button (click)="refreshStats()" class="refresh-button">Erneut versuchen</button>
      </div>
    </div>

    <!-- Main Content -->
    <div *ngIf="!isLoading && !hasError" class="dashboard-grid">
      <!-- Left Column -->
      <div class="column">
        <!-- Stats Overview -->
        <div class="grid-item">
          <app-stats-overview [userStatistics]="userStatistics"></app-stats-overview>
        </div>

        <!-- Quests Cards -->
        <div class="grid-item">
          <app-quests></app-quests>
        </div>

        <div class="grid zvcoins-subgrid grid-cols-1 md:grid-cols-2 gap-2">
          <!-- Custom Sprays -->
          <div class="grid-item spray-card-container">
            <app-spray-management [isDonator]="isDonator"></app-spray-management>
          </div>

          <!-- Lootbox Card -->
          <div class="grid-item min-w-0 lootbox-grid-item">
            <app-lootbox
              [balance]="userStatistics.experience || 0"
              (balanceChange)="onBalanceChange($event)"
            ></app-lootbox>
          </div>

          <!-- Fakerank -->
          <div class="grid-item fakerank-container">
            <app-fakerank [isDonator]="isDonator"></app-fakerank>
          </div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="column">
        <div class="grid-item">
          <app-player-info-card [userStatistics]="userStatistics"></app-player-info-card>
        </div>
      </div>
    </div>
  </div>
</div>
