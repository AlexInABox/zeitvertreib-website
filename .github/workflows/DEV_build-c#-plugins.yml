name: Build C# Plugins (dev)

on:
  workflow_dispatch:
  pull_request_target:
    branches: [dev]
    types:
      - opened
      - edited
      - synchronize
  push:
    branches: [dev]
    paths:
      - "[A-Z]*/**"
      - "*.sln"
      - "*.csproj"
      - "types/**"

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/REUSABLE_build-c#-plugins.yml