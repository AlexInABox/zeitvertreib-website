name: Build All C# Plugins (Reusable)

on:
  workflow_call:

env:
  REFERENCES_URL: https://dev.zeitvertreib.vip/assets/buildtools/scpsl-references.zip
  EXILED_REFERENCES: ${{ github.workspace }}/References
  AUDIO_PLAYER_API_URL: https://github.com/Killers0992/AudioPlayerApi/releases/download/1.1.2/dependencies.zip
  SNAKE_API_DLL_URL: https://s3.sr.ht/builds.sr.ht/artifacts/~furry/1546053/1734f84d467bcf19/SnakeAPI.dll
  UCR_DLL_URL: https://github.com/UncomplicatedCustomServer/UncomplicatedCustomRoles/releases/download/v9.2.0/UncomplicatedCustomRoles-LabAPI.dll

jobs:
  build:
    name: 🔨 Build All Plugins
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: types/package-lock.json

      - name: Build shared types
        working-directory: types
        run: |
          npm install
          npm run build

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: nuget restore zeitvertreibplugins.sln

      - name: Download dependencies
        shell: pwsh
        run: |
          function Invoke-WebRequestWithRetry {
              param(
                  [string]$Uri,
                  [string]$OutFile,
                  [int]$MaxRetries = 3,
                  [int]$RetryDelaySeconds = 5
              )
              for ($i = 0; $i -lt $MaxRetries; $i++) {
                  try {
                      Invoke-WebRequest -Uri $Uri -OutFile $OutFile -ErrorAction Stop
                      return
                  } catch {
                      if ($i -lt $MaxRetries - 1) {
                          Write-Host "Download failed, retrying in $RetryDelaySeconds seconds... (Attempt $($i + 1)/$MaxRetries)"
                          Start-Sleep -Seconds $RetryDelaySeconds
                      } else {
                          throw
                      }
                  }
              }
          }

          Invoke-WebRequestWithRetry -Uri $env:REFERENCES_URL -OutFile "$env:GITHUB_WORKSPACE/Dev.zip"
          Expand-Archive -Path "$env:GITHUB_WORKSPACE/Dev.zip" -DestinationPath $env:EXILED_REFERENCES

          Invoke-WebRequestWithRetry -Uri $env:AUDIO_PLAYER_API_URL -OutFile "$env:GITHUB_WORKSPACE/AudioPlayerApi.zip"
          Expand-Archive -Path "$env:GITHUB_WORKSPACE/AudioPlayerApi.zip" -DestinationPath "$env:GITHUB_WORKSPACE/AudioPlayerApi"
          Get-ChildItem "$env:GITHUB_WORKSPACE/AudioPlayerApi/dependencies" -Filter *.dll | ForEach-Object {
              $target = Join-Path $env:EXILED_REFERENCES $_.Name
              if (-not (Test-Path $target)) { Copy-Item $_.FullName $target }
          }

          Invoke-WebRequestWithRetry -Uri $env:SNAKE_API_DLL_URL -OutFile (Join-Path $env:EXILED_REFERENCES "SnakeAPI.dll")
          Invoke-WebRequestWithRetry -Uri $env:UCR_DLL_URL -OutFile (Join-Path $env:EXILED_REFERENCES "UncomplicatedCustomRoles-LabAPI.dll")

      - name: Build all plugins
        run: |
          msbuild zeitvertreibplugins.sln `
            -property:Configuration=Release `
            -maxcpucount `
            -verbosity:minimal

      - name: Collect plugin DLLs
        shell: pwsh
        run: |
          $staging = "$env:GITHUB_WORKSPACE/staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Recurse -Filter "*.dll" |
            Where-Object {
              $_.FullName -like "*\bin\Release\*" -and
              $_.FullName -notlike "*\obj\*"       -and
              $_.FullName -notlike "*\References\*"
            } |
            ForEach-Object {
              $plugin = $_.FullName.Substring("$env:GITHUB_WORKSPACE\".Length).Split('\')[0]
              $dest   = Join-Path $staging $plugin
              New-Item -ItemType Directory -Force -Path $dest | Out-Null
              Copy-Item $_.FullName -Destination $dest -Force
              Write-Host "Staged: $plugin/$($_.Name)"
            }

      - name: Upload all plugin DLLs
        uses: actions/upload-artifact@v7
        with:
          name: all-plugins
          path: staging/
          if-no-files-found: error